<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRA GM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<!-- Adsterra Popunder -->
<script src="https://upholdbrilliancerecast.com/60/45/90/604590fe5ba0fe019a411351f2307164.js"></script>
<!-- Adsterra Social Bar -->
<script src="https://upholdbrilliancerecast.com/52/f2/92/52f2928b64b329281d613e02df315ebb.js"></script>

<style>
/* ── VARIABLES ──────────────────────────────────── */
:root {
  --navy:    #0a1628;
  --navy2:   ##23475e;
  --accent:  #0d7fc8;
  --accent2: #2423b3;
  --gold:    #f59e0b;
  --green:   #10b981;
  --white:   #fff;
  --gray:    #94a3b8;
  --gray2:   #64748b;
  --title-bg: rgba(13,27,58,0.95);
}

/* ── RESET ──────────────────────────────────────── */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--navy);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--white);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 60%, rgba(37,99,235,.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(59,130,246,.04) 0%, transparent 50%),
    var(--navy);
  z-index: 0; pointer-events: none;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #091525 0%, #162d54 50%, #091525 100%);
  border-bottom: 2px solid var(--accent);
  box-shadow: 0 4px 24px rgba(37,99,235,.35);
  padding: 0 16px; height: 62px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left  { display: flex; align-items: center; gap: 11px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.logo-img {
  width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid var(--accent2); object-fit: cover;
  box-shadow: 0 0 14px rgba(59,130,246,.55);
}
.logo-text {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: 1.25rem; color: var(--white); letter-spacing: 2px;
  text-shadow: 0 0 18px rgba(59,130,246,.7);
}
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--white); padding: 8px; border-radius: 50%;
  transition: background .2s; display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: rgba(255,255,255,.09); }
.auth-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; color: #fff; padding: 7px 15px; border-radius: 20px;
  cursor: pointer; font-family: 'Exo 2', sans-serif;
  font-weight: 700; font-size: .82rem; transition: all .2s;
  box-shadow: 0 2px 10px rgba(37,99,235,.35);
}
.auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,.5); }
.user-info { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .78rem; color: #fff;
}
.logout-btn {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
  color: #fff; padding: 5px 11px; border-radius: 14px; cursor: pointer;
  font-size: .75rem; transition: all .2s; font-family: 'Exo 2', sans-serif;
}
.logout-btn:hover { background: rgba(239,68,68,.2); border-color: rgba(239,68,68,.3); }

/* ── SEARCH ─────────────────────────────────────── */
.search-bar {
  display: none; padding: 10px 16px;
  background: var(--navy2); border-bottom: 1px solid rgba(37,99,235,.25);
  position: relative; z-index: 99;
}
.search-bar.open { display: block; }
.search-bar input {
  width: 100%; padding: 9px 16px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(37,99,235,.35);
  border-radius: 22px; color: #fff;
  font-family: 'Exo 2', sans-serif; font-size: .9rem; outline: none;
}
.search-bar input::placeholder { color: var(--gray2); }

/* ── TABS ───────────────────────────────────────── */
.tabs-wrap {
  position: relative; z-index: 1; display: flex;
  background: var(--navy2); border-bottom: 1px solid rgba(37,99,235,.18);
  max-width: 500px; margin: 0 auto;
}
.tab-btn {
  flex: 1; padding: 13px 0; background: none; border: none; cursor: pointer;
  font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: .88rem;
  color: rgba(100,116,139,0.45);
  letter-spacing: 1px; transition: all .25s;
  border-bottom: 3px solid transparent;
}
.tab-btn.active {
  color: var(--white);
  border-bottom-color: var(--accent);
  background: rgba(37,99,235,0.08);
}
.tab-btn.tab-paid.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: rgba(245,158,11,0.08);
}

/* ── MAIN ───────────────────────────────────────── */
main { position: relative; z-index: 1; padding: 18px 14px 28px; max-width: 500px; margin: 0 auto; }

/* ── ADS ────────────────────────────────────────── */
.ad-block {
  margin: 0 0 18px; border-radius: 12px; overflow: hidden;
  background: rgba(255,255,255,.03); border: 1px solid rgba(37,99,235,.12);
}
.ad-side { display: flex; justify-content: center; margin: 20px 0; opacity: .9; }

/* ── CARDS ──────────────────────────────────────── */
.card-item { margin-bottom: 20px; animation: fadeUp .38s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-image-wrap {
  background: #f1f5f9; border-radius: 18px;
  overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.38);
  cursor: pointer; transition: transform .2s, box-shadow .2s;
  display: block; text-decoration: none; min-height: 190px; position: relative;
}
.card-image-wrap:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(37,99,235,.35); }
.card-image-wrap img { width: 100%; display: block; object-fit: cover; min-height: 190px; max-height: 290px; }
.card-image-placeholder {
  width: 100%; min-height: 190px; display: flex; align-items: center; justify-content: center;
  color: #94a3b8; font-size: .88rem; background: linear-gradient(135deg,#dde3ed,#eef1f6);
}
.card-badge {
  position: absolute; top: 11px; right: 11px;
  font-weight: 800; font-size: .68rem; padding: 3px 9px; border-radius: 18px; letter-spacing: .8px;
}
.badge-free     { background: linear-gradient(135deg,#059669,#10b981); color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,.45); }
.badge-paid-tag { background: linear-gradient(135deg,#d97706,#f59e0b); color: #1a1100; box-shadow: 0 2px 8px rgba(245,158,11,.45); }
.card-click-count {
  position: absolute; bottom: 10px; left: 12px;
  background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
  color: #fff; font-size: .68rem; padding: 3px 9px; border-radius: 12px;
  display: flex; align-items: center; gap: 4px;
}

/* ── LOCKED CARD ────────────────────────────────── */
.card-locked { position: relative; border-radius: 18px; overflow: hidden; min-height: 190px; cursor: pointer; }
.card-locked-overlay {
  position: absolute; inset: 0;
  background: rgba(8,18,36,.68); backdrop-filter: blur(7px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 9px; border-radius: 18px;
}
.lock-text  { color: #fff; font-weight: 700; font-size: .88rem; text-align: center; padding: 0 14px; }
.lock-price { color: var(--gold); font-weight: 900; font-size: 1.05rem; font-family: 'Orbitron', monospace; }
.unlock-btn {
  background: linear-gradient(135deg, var(--gold), #d97706);
  border: none; color: #1a1100; padding: 9px 22px; border-radius: 18px;
  cursor: pointer; font-weight: 800; font-family: 'Exo 2', sans-serif;
  font-size: .85rem; transition: all .2s; letter-spacing: .8px;
}
.unlock-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(245,158,11,.45); }

/* ── CARD TITLE BOX ─────────────────────────────── */
.card-title-box {
  background: var(--title-bg); border-radius: 13px;
  padding: 11px 14px; margin-top: 7px; border: 1px solid rgba(37,99,235,.2);
}
.card-title-row   { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-title       { font-weight: 700; color: var(--white); font-size: .92rem; }
.card-click-label { color: var(--gray2); font-size: .7rem; display: flex; align-items: center; gap: 3px; white-space: nowrap; flex-shrink: 0; }
.card-desc-preview { color: var(--gray2); font-size: .79rem; margin-top: 4px; cursor: pointer; }
.card-desc-full {
  display: none; color: var(--gray); font-size: .79rem; line-height: 1.55;
  padding-top: 7px; border-top: 1px solid rgba(255,255,255,.08); margin-top: 7px;
}
.card-desc-full.open { display: block; }

/* ── PAGINATION ─────────────────────────────────── */
.pagination { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 14px 0; }
.page-btn {
  min-width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(37,99,235,.35); background: rgba(37,99,235,.12);
  color: #fff; cursor: pointer; font-weight: 700; font-size: .85rem;
  transition: all .2s; display: flex; align-items: center; justify-content: center; padding: 0 6px;
}
.page-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 2px 10px rgba(37,99,235,.45); }
.page-btn:hover  { background: rgba(37,99,235,.35); }

/* ── COMMENTS SECTION ───────────────────────────── */
.comments-section { margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(37,99,235,.22); }
.section-title {
  font-family: 'Orbitron', monospace; font-size: .92rem; font-weight: 700;
  color: var(--white); letter-spacing: 2px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }

/* ── COMMENT FORM ───────────────────────────────── */
.comment-input-area {
  background: rgba(255,255,255,.04); border: 1px solid rgba(37,99,235,.22);
  border-radius: 14px; padding: 14px; margin-bottom: 16px;
}
.comment-login-prompt { text-align: center; color: var(--gray); font-size: .88rem; padding: 10px; }
.comment-login-prompt button {
  background: var(--accent); border: none; color: #fff; padding: 6px 14px;
  border-radius: 14px; cursor: pointer; margin-left: 7px;
  font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: .82rem;
}
.rating-row  { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.rating-label { color: var(--gray); font-size: .8rem; }
.stars-input { display: flex; gap: 2px; }
.stars-input span {
  font-size: 0; width: 18px; height: 18px; cursor: pointer;
  display: inline-block; position: relative;
}
.stars-input span::before {
  content: ''; display: block; width: 18px; height: 18px;
  background: var(--gray2);
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  transition: background .15s;
}
.stars-input span.on::before,
.stars-input span.hover::before { background: var(--gold); }
.item-select {
  background: rgba(255,255,255,.07); border: 1px solid rgba(37,99,235,.3);
  border-radius: 9px; color: #fff; font-family: 'Exo 2', sans-serif;
  font-size: .82rem; padding: 6px 10px; outline: none; cursor: pointer;
}
.item-select option { background: #0d1f3c; }
.comment-form textarea {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(37,99,235,.25);
  border-radius: 10px; color: #fff; padding: 10px 12px;
  font-family: 'Exo 2', sans-serif; font-size: .88rem; resize: vertical; min-height: 72px; outline: none;
}
.comment-form textarea::placeholder { color: var(--gray2); }
.comment-submit {
  margin-top: 8px; float: right;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; color: #fff; padding: 7px 18px; border-radius: 18px;
  cursor: pointer; font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: .84rem; transition: all .2s;
}
.comment-submit:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(37,99,235,.4); }

/* ── RATING SUMMARY ─────────────────────────────── */
.rating-summary {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  padding: 10px 14px; background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07); border-radius: 12px;
}
.rating-avg   { font-size: 1.6rem; font-weight: 900; color: var(--gold); font-family: 'Orbitron', monospace; }
.rating-stars-row { display: flex; flex-direction: column; gap: 2px; }
.rating-count { color: var(--gray2); font-size: .75rem; }

/* ── COMMENT ITEM ───────────────────────────────── */
.comments-list { clear: both; }
.comment-item {
  background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.055);
  border-radius: 13px; padding: 13px; margin-bottom: 11px; animation: fadeUp .3s ease;
}
.comment-header { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; }
.comment-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .75rem; color: #fff; flex-shrink: 0; margin-top: 1px;
}
.comment-meta     { flex: 1; min-width: 0; }
.comment-name     { font-weight: 700; color: #fff; font-size: .85rem; }
.comment-item-ref { color: var(--accent2); font-size: .72rem; margin-top: 1px; }
.comment-time     { color: var(--gray2); font-size: .72rem; white-space: nowrap; margin-left: auto; }
.comment-text     { color: #c8d5e8; font-size: .85rem; line-height: 1.5; margin-left: 39px; }

/* ── STAR DISPLAY ───────────────────────────────── */
.stars-display { display: flex; gap: 2px; margin-top: 2px; }
.stars-display span { width: 13px; height: 13px; display: inline-block; }
.stars-display span::before {
  content: ''; display: block; width: 13px; height: 13px;
  background: var(--gray2);
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}
.stars-display span.filled::before { background: var(--gold); }
.top-comment-badge {
  display: inline-block; background: linear-gradient(135deg, var(--gold), #d97706);
  color: #1a1100; font-size: .62rem; font-weight: 800;
  padding: 2px 7px; border-radius: 10px; margin-left: 6px;
  letter-spacing: .5px; vertical-align: middle;
}

/* ── REPLY SYSTEM ───────────────────────────────── */
.comment-actions { display: flex; align-items: center; gap: 8px; margin-top: 7px; margin-left: 39px; }
.reply-btn {
  background: none; border: none; color: var(--gray2); font-size: .75rem;
  cursor: pointer; font-family: 'Exo 2', sans-serif;
  padding: 3px 8px; border-radius: 10px; transition: all .2s;
}
.reply-btn:hover { background: rgba(37,99,235,.15); color: var(--accent2); }
.reply-form { margin-top: 8px; margin-left: 39px; display: none; }
.reply-form.open { display: block; }
.reply-form textarea {
  width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid rgba(37,99,235,.2); border-radius: 9px;
  color: #fff; padding: 8px 11px; font-family: 'Exo 2', sans-serif;
  font-size: .82rem; resize: none; height: 60px; outline: none;
}
.reply-form textarea::placeholder { color: var(--gray2); }
.reply-submit {
  margin-top: 5px; background: rgba(37,99,235,.25);
  border: 1px solid rgba(37,99,235,.35); color: var(--accent2);
  padding: 5px 13px; border-radius: 12px; cursor: pointer;
  font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: .78rem; float: right;
}
.replies-wrap { margin-top: 7px; margin-left: 39px; clear: both; }
.reply-item {
  background: rgba(255,255,255,.025); border-left: 2px solid rgba(37,99,235,.3);
  border-radius: 0 8px 8px 0; padding: 8px 11px; margin-bottom: 6px;
}
.reply-author { font-weight: 700; color: #fff; font-size: .78rem; }
.reply-time   { color: var(--gray2); font-size: .68rem; margin-left: 6px; }
.reply-text   { color: #9db4cc; font-size: .8rem; line-height: 1.45; margin-top: 3px; }
.show-more-replies {
  background: none; border: none; color: var(--accent2);
  font-size: .75rem; cursor: pointer; font-family: 'Exo 2', sans-serif;
  padding: 3px 0; margin-top: 2px; display: block;
}
.load-more-btn {
  display: block; width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08); color: var(--gray);
  padding: 10px; border-radius: 12px; cursor: pointer;
  font-family: 'Exo 2', sans-serif; font-size: .82rem; margin-top: 4px; transition: all .2s;
}
.load-more-btn:hover { background: rgba(37,99,235,.1); color: #fff; }

/* ── FOOTER ─────────────────────────────────────── */
footer { position: relative; z-index: 1; border-top: 1px solid rgba(37,99,235,.13); padding: 20px 16px 36px; text-align: center; }
.footer-socials { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
.footer-label   { color: rgba(148,163,184,.45); font-size: .73rem; letter-spacing: .8px; }
.social-link {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09);
  transition: all .2s; text-decoration: none; color: #fff;
}
.social-link:hover { background: rgba(37,99,235,.18); border-color: var(--accent2); transform: translateY(-2px); }
.social-link svg { width: 16px; height: 16px; fill: currentColor; }
.footer-copy { margin-top: 12px; color: rgba(148,163,184,.22); font-size: .68rem; letter-spacing: .8px; }

/* ── ADMIN PANEL ────────────────────────────────── */
.admin-panel { display: none; background: var(--navy2); border: 1px solid rgba(37,99,235,.35); border-radius: 18px; padding: 18px; margin-bottom: 20px; }
.admin-panel.active { display: block; }
.admin-panel h3 { font-family: 'Orbitron', monospace; font-size: .88rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 14px; }
.admin-form label { color: var(--gray2); font-size: .76rem; display: block; margin-bottom: 3px; }
.admin-form input,
.admin-form textarea,
.admin-form select {
  width: 100%; padding: 9px 12px; margin-bottom: 9px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(37,99,235,.3);
  border-radius: 9px; color: #fff; font-family: 'Exo 2', sans-serif; font-size: .85rem; outline: none;
}
.admin-form select { appearance: none; cursor: pointer; }
.admin-form select option { background: #0d1f3c; }
.admin-form input::placeholder,
.admin-form textarea::placeholder { color: var(--gray2); }
.admin-form textarea { min-height: 60px; resize: vertical; }
.price-field { display: none; }
.admin-submit { background: linear-gradient(135deg, var(--gold), #d97706); border: none; color: #1a1100; padding: 9px 22px; border-radius: 18px; cursor: pointer; font-weight: 800; font-family: 'Exo 2', sans-serif; font-size: .88rem; transition: all .2s; }
.admin-submit:hover { box-shadow: 0 3px 14px rgba(245,158,11,.4); }
.cancel-btn { background: rgba(255,255,255,.07); border: none; color: var(--gray); padding: 9px 16px; border-radius: 18px; cursor: pointer; font-family: 'Exo 2', sans-serif; font-size: .82rem; }
.admin-items-list { margin-top: 16px; }
.admin-item { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 10px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.admin-item-info  { flex: 1; min-width: 0; }
.admin-item-title { color: #fff; font-size: .85rem; font-weight: 600; }
.admin-item-meta  { font-size: .72rem; margin-top: 2px; }
.meta-free { color: var(--green); font-weight: 700; }
.meta-paid { color: var(--gold);  font-weight: 700; }
.btn-sm  { padding: 4px 9px; border-radius: 7px; cursor: pointer; font-size: .72rem; border: 1px solid; flex-shrink: 0; font-family: 'Exo 2', sans-serif; font-weight: 700; }
.btn-edit { background: rgba(37,99,235,.15); border-color: rgba(37,99,235,.3); color: #93c5fd; }
.btn-del  { background: rgba(239,68,68,.15);  border-color: rgba(239,68,68,.3);  color: #f87171; }

/* ── MODALS ─────────────────────────────────────── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal {
  background: var(--navy2); border: 1px solid rgba(37,99,235,.38);
  border-radius: 22px; padding: 28px 24px; width: 92%; max-width: 370px;
  box-shadow: 0 16px 56px rgba(0,0,0,.55); animation: fadeUp .28s ease; position: relative;
}
.modal h2 { font-family: 'Orbitron', monospace; font-size: 1rem; color: #fff; margin-bottom: 18px; text-align: center; letter-spacing: 2px; }
.modal input { width: 100%; padding: 11px 14px; margin-bottom: 10px; background: rgba(255,255,255,.06); border: 1px solid rgba(37,99,235,.35); border-radius: 10px; color: #fff; font-family: 'Exo 2', sans-serif; font-size: .88rem; outline: none; }
.modal input::placeholder { color: var(--gray2); }

.pay-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(245,158,11,.45); }

@keyframes spin { to { transform: rotate(360deg); } }
